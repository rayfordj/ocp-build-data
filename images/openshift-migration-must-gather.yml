cachito:
  packages:
    gomod:
      - path: pprof/
content:
  source:
    dockerfile: konflux.Dockerfile
    git:
      branch:
        target: release-1.8
      url: git@github.com:openshift-priv/migtools-must-gather.git
      web: https://github.com/migtools/must-gather
    modifications:
      # https://github.com/migtools/must-gather/blob/release-1.8/konflux.Dockerfile#L17
      - action: replace
        match: "dnf -y"
        replacement: "microdnf -y"
      - action: replace
        match: "dnf clean all"
        replacement: "microdnf clean all"
    pkg_managers:
    - gomod
delivery:
  delivery_repo_names:
    - rhmtc/openshift-migration-must-gather-rhel8
dependents:
  - openshift-migration-operator
distgit:
  branch: rhaos-{MAJOR}.{MINOR}-rhel-8
  component: openshift-migration-must-gather-container
enabled_repos:
  - rhel-8-appstream-rpms
  - rhel-8-baseos-rpms
for_payload: false
from:
  builder:
    - stream: ose-must-gather
    - stream: rhel-8-golang
  member: base-rhel8
konflux:
  cachi2:
    lockfile:
      dnf_modules_enable: true
      enabled: true
      inspect_parent: false
      rpms:
        - adobe-mappings-cmap
        - adobe-mappings-cmap-deprecated
