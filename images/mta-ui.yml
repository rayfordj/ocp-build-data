cachito:
  packages:
    npm:
      - path: .
content:
  source:
    dockerfile: konflux.Dockerfile
    git:
      branch:
        target: release-0.9
      url: git@github.com:openshift-priv/migtools-mta-tackle2-ui.git
      web: https://github.com/migtools/mta-tackle2-ui
    modifications:
      # https://github.com/migtools/mta-tackle2-ui/blob/release-0.9/konflux.Dockerfile#L21
      - action: replace
        match: "dnf -y install"
        replacement: "dnf -y update && dnf -y install"
jira:
  project: MTA
  component: UI
distgit:
  component: mta-ui-container
delivery:
  delivery_repo_names:
  - mta/mta-ui-rhel9
for_payload: false
enabled_repos:
- rhel-9-appstream-rpms
- rhel-9-baseos-rpms
from:
  builder:
    - stream: rhel-9-nodejs-20
  stream: rhel-9-nodejs-20
name: mta/mta-ui-rhel9
owners:
- mta-devs@redhat.com
dependents:
  - mta-operator
