cachito:
  packages:
    yarn:
      - path: .
content:
  source:
    dockerfile: konflux.Dockerfile
    git:
      branch:
        target: release-1.8
      url: git@github.com:openshift-priv/migtools-mig-ui.git
      web: https://github.com/migtools/mig-ui
delivery:
  delivery_repo_names:
    - rhmtc/openshift-migration-ui-rhel8
dependents:
  - openshift-migration-operator
distgit:
  branch: rhaos-{MAJOR}.{MINOR}-rhel-8
  component: openshift-migration-ui-container
enabled_repos:
  - rhel-88-appstream-rpms
  - rhel-88-baseos-rpms
for_payload: false
from:
  builder:
    - stream: nodejs-18
  stream: nodejs-18-minimal
konflux:
  cachi2:
    lockfile:
      enabled: true
      dnf_modules_enable: true
      modules:
        - nodejs:18
        - python36:3.6
      inspect_parent: false
      rpms:
        -  annobin
        -  brotli-devel
        -  dwz
        -  efi-srpm-macros
        -  file
        -  file-libs
        -  ghc-srpm-macros
        -  glibc
        -  glibc-common
        -  glibc-gconv-extra
        -  go-srpm-macros
        -  nodejs
        -  nodejs-devel
        -  nodejs-docs
        -  nodejs-full-i18n
        -  nodejs-packaging
        -  npm
        -  ocaml-srpm-macros
        -  openblas-srpm-macros
        -  openssl
        -  openssl-devel
        -  openssl-libs
        -  openssl-pkcs11
        -  perl-srpm-macros
        -  platform-python-pip
        -  platform-python-setuptools
        -  python-rpm-macros
        -  python-srpm-macros
        -  python3-pip
        -  python3-rpm-macros
        -  python3-setuptools
        -  python36
        -  qt5-srpm-macros
        -  redhat-rpm-config-125-1.el8
        -  rust-srpm-macros
        -  zip
name: rhmtc/openshift-migration-ui-rhel8
owners:
  - ocp-migrate-team@redhat.com
jira:
  project: MIG
  component: openshift-migration-ui-container
