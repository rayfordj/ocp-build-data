arches:
- x86_64
- aarch64
content:
  source:
    dockerfile: Dockerfile.ocp
    git:
      branch:
        target: release-{MAJOR}.{MINOR}
      url: git@github.com:openshift-priv/ironic-agent-image.git
      web: https://github.com/openshift/ironic-agent-image
    pkg_managers:
    - pip
cachito:
  enabled: true
  packages:
    pip:
    - path: .
      requirements_files:
      - requirements.cachito
      - requirements-build.cachito
distgit:
  branch: rhaos-{MAJOR}.{MINOR}-rhel-9
  component: ironic-agent-container
delivery:
  # Maps to honeybadger repo_name
  repo_name: ose-ironic-agent
  delivery_repo_names:
  - openshift4/ose-ironic-agent-rhel9
for_payload: true
from:
  member: openshift-enterprise-base-rhel9
name: openshift/ose-ironic-agent-rhel9
payload_name: ironic-agent
owners:
- ironic-osp-owners@redhat.com
enabled_repos:
- rhel-9-appstream-rpms
- rhel-9-baseos-rpms
- rhel-9-codeready-builder-rpms
- rhel-9-server-ironic-rpms
